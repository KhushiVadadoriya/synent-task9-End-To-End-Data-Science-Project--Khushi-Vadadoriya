<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Exam Performance Indicator</title>
	<style>
		:root {
			color-scheme: light;
			--bg1: #f6f8ff;
			--bg2: #eef2ff;
			--card: rgba(255, 255, 255, 0.82);
			--text: #1f2937;
			--muted: #6b7280;
			--accent: #2563eb;
			--accent-dark: #1d4ed8;
			--border: #dbe3f0;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: Arial, Helvetica, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
				linear-gradient(135deg, var(--bg1), var(--bg2));
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.card {
			width: min(760px, 100%);
			background: var(--card);
			border: 1px solid rgba(219, 227, 240, 0.9);
			border-radius: 24px;
			box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
			padding: 40px;
			backdrop-filter: blur(10px);
		}

		.eyebrow {
			display: inline-block;
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 0.16em;
			text-transform: uppercase;
			color: var(--accent);
			margin-bottom: 14px;
		}

		h1 {
			margin: 0 0 12px;
			font-size: clamp(2rem, 4vw, 3rem);
			line-height: 1.05;
		}

		p {
			margin: 0 0 28px;
			color: var(--muted);
			font-size: 1rem;
			line-height: 1.7;
			max-width: 58ch;
		}

		a.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 48px;
			padding: 0 20px;
			border-radius: 999px;
			background: linear-gradient(135deg, var(--accent), var(--accent-dark));
			color: white;
			text-decoration: none;
			font-weight: 700;
			box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		a.button:hover {
			transform: translateY(-1px);
			box-shadow: 0 14px 30px rgba(37, 99, 235, 0.3);
		}

		.note {
			margin-top: 18px;
			font-size: 0.95rem;
			color: var(--muted);
		}
	</style>
</head>
<body>
	<main class="card">
		<span class="eyebrow">Machine Learning App</span>
		<h1>Student Exam Performance Indicator</h1>
		<p>Predict a student’s maths score from a few simple details. The interface is intentionally minimal so the result stays easy to use and read.</p>
		<a class="button" href="{{ url_for('predict_datapoint') }}">Open Prediction Form</a>
		<div class="note">Fast, clean, and ready for quick testing.</div>
	</main>
</body>
</html>
